  restart_window_minutes: 10

dashboard:
  # --- Legacy ---
  refresh_interval_sec: 2          # deprecated; superseded by tiered intervals below
  max_trade_history_display: 20

  # --- Tiered refresh cadence (HOT / WARM / COLD) ---
  # Consumed by dashboard/core/dashboard_clock.py via dashboard/main.py.
  # HOT  = positions / pnl   — must stay <= 250ms for trader perception of "live"
  # WARM = orders / risk     — 1s is the institutional norm
  # COLD = analytics / journal — 5s is acceptable; never below 2s (CPU cost)
  hot_interval_ms: 200
  warm_interval_ms: 1000
  cold_interval_ms: 5000

  # --- Shared memory / IPC contracts ---
  # Names of OS-level resources the dashboard process discovers at startup.
  # Must match what the backend (main.py) publishes.
  backend_heartbeat_name: "ja_backend_heartbeat"
  kill_switch_name: "junior_aladdin_kill_switch"

  # --- Dashboard IPC (Part 2A / 2B) ---
  ipc_host: "127.0.0.1"
  snapshot_port: 18765
  command_port: 18766
  sample_capture_dir: "artifacts/dashboard_ipc_samples"
  plotly_bundle: "dashboard/assets/plotly-2.35.2.min.js"

  # --- Week 06 Component Guard / Global Vitals contract ---
  # Dashboard-only schema for the top NIFTY heavyweight names the backend may
  # publish through HOT snapshots as `component_guard_heavyweights`.  This does
  # not create data or alpha; it gives the dashboard a deterministic display
  # contract and a safe fallback order for labels/placeholders.
  component_guard:
    enabled: true
    max_heavyweights: 5
    top_heavyweights: ["RELIANCE", "HDFCBANK", "ICICIBANK", "INFY", "TCS"]
    veto_states: ["OK", "WATCH", "VETO", "DISABLED", "UNKNOWN"]
    veto_blocks_live: true
    missing_data_state: "VETO"
    replay_disables_veto_signal: true


mtf:
  weights: {1min: 1.0, 3min: 1.5, 5min: 2.0, 15min: 3.0}
  thresholds: {strong_bullish: 6.0, bullish: 3.0, neutral_low: -3.0, strong_bearish: -6.0}
  vix_weight_scale: {enabled: true, vix_threshold: 20.0, scale_1min: 0.5, scale_3min: 0.5}
  session_threshold_scale: {enabled: true, phases: ["LUNCH_LULL", "LAST_MINUTES"], multiplier: 1.2}
  key_level_confluence: {enabled: true, proximity_pct: 0.001, bonus_strength_points: 10.0}

historical:
